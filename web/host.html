<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>host lobby</title>
  <link rel="stylesheet" href="/web/static/css/global.css" />
  <link rel="stylesheet" href="/web/static/css/host.css" />
  <link rel="stylesheet" href="/web/games/drawn_together/dt_host.css" />
</head>

<body>
  <div class="container">
    
    <div id="connection-ui">
      <div id="join-link-display" class="join-link-container"></div>

      <h1>host</h1>

      <div class="room-box">
        <span class="label">room code:</span>
        <span class="code">....</span>
      </div>

      <button class="start-btn" id="startGameBtn">start game</button>

      <div class="main-row">
        <div class="games-box">
          <p>select game</p>
          <div class="game-options">
            <div class="game-card">drawn together</div>
            <div class="game-card">game 2</div>
            <div class="game-card">game 3</div>
          </div>
        </div>

        <div class="lobby-box">
          <p>players</p>
          <ul id="player-list">
            <li>waiting for players...</li>
          </ul>
        </div>
      </div>

      <div class="options-box hidden" id="options-box">
        <p>options</p>
        <div class="options-content" id="options-content">
        </div>
      </div>

    </div>

    <div id="game-root"></div>

  </div>

  <script src="/web/main.js"></script>
  <script src="/web/games/drawn_together/dt_host.js"></script>
</body>

</html>
